<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario Auto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container">
        <h1>Agregar Nuevo Auto</h1>

        <form th:action="@{/autos/guardar}" th:object="${auto}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{imagen}">

         <div class="mb-3">
    <label class="form-label">Marca</label>
    <select th:field="*{marca}" class="form-select" required>
        <option value="" selected disabled>Seleccione una marca...</option>
        <option value="Toyota">Toyota</option>
        <option value="Honda">Honda</option>
        <option value="Ford">Ford</option>
        <option value="Chevrolet">Chevrolet</option>
        <option value="BMW">BMW</option>
        <option value="Mercedes-Benz">Mercedes-Benz</option>
        <option value="Audi">Audi</option>
        <option value="Volkswagen">Volkswagen</option>
        <option value="Nissan">Nissan</option>
        <option value="Hyundai">Hyundai</option>
        <option value="Kia">Kia</option>
        <option value="Mazda">Mazda</option>
        <option value="Subaru">Subaru</option>
        <option value="Porsche">Porsche</option>
        <option value="Ferrari">Ferrari</option>
        <option value="Lamborghini">Lamborghini</option>
        <option value="Mclaren">Mclaren</option>
        <option value="Aston Martin">Aston Martin</option>
        <option value="Range Rover">Range Rover</option>
        <option value="Suzuki">Suzuki</option>
        <option value="Renault">Renault</option>
        <option value="Volvo">Volvo</option>
        <option value="Jeep">Jeep</option>
        </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Modelo</label>
                <input type="text" th:field="*{modelo}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Año</label>
                <input type="number" th:field="*{anio}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Precio</label>
                <input type="number" th:field="*{precio}" class="form-control" required>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" th:field="*{disponible}" class="form-check-input">
                <label class="form-check-label">Disponible</label>
            </div>

            <div class="mb-3">
            <label for="archivoImagen" class="form-label">Imagen</label>
            <div th:if="${auto.imagen != null and !auto.imagen.isBlank()}" class="mb-2">
            <img th:src="@{'/uploads/' + ${auto.imagen}}" alt="Imagen del auto"
               style="max-height: 150px; border: 1px solid #dee2e6; padding: 4px;">
            </div>
            <input type="file" name="archivoImagen" id="archivoImagen" accept="image/*" class="form-control">
            <div class="form-text">Dejar vacío para conservar la imagen actual.</div>
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/autos}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
  </body>
</html>
