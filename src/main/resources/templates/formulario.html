<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario Auto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container">
        <h1>Agregar Nuevo Auto</h1>

        <form th:action="@{/autos/guardar}" th:object="${auto}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Marca</label>
                <input type="text" th:field="*{marca}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Modelo</label>
                <input type="text" th:field="*{modelo}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Año</label>
                <input type="number" th:field="*{anio}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Precio</label>
                <input type="number" th:field="*{precio}" class="form-control" required>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" th:field="*{disponible}" class="form-check-input">
                <label class="form-check-label">Disponible</label>
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/autos}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
  </body>
</html>
