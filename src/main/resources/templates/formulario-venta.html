<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" th:href="@{/autos}">Concesionario</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item" th:if="${session.usuarioLogueado != null}">
              <span class="nav-link text-light">Bienvenido, <span th:text="${session.usuarioLogueado.nombre}"></span></span>
            </li>
            <li class="nav-item" th:if="${session.usuarioLogueado != null}">
              <a class="nav-link" th:href="@{/logout}">Cerrar sesión</a>
            </li>
            <li class="nav-item" th:unless="${session.usuarioLogueado != null}">
              <a class="nav-link" th:href="@{/login}">Iniciar sesión</a>
            </li>
            <li class="nav-item" th:unless="${session.usuarioLogueado != null}">
              <a class="nav-link" th:href="@{/registro}">Registrarse</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <h1 th:text="${venta.id != null ? 'Editar Venta' : 'Nueva Venta'}"></h1>

      <form th:action="@{/ventas/guardar}" th:object="${venta}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
          <label class="form-label">Fecha</label>
          <input type="date" th:field="*{fecha}" class="form-control" required>
          <div th:if="${#fields.hasErrors('fecha')}" class="text-danger" th:errors="*{fecha}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Precio Final</label>
          <input type="number" step="0.01" th:field="*{precioFinal}" class="form-control" required>
          <div th:if="${#fields.hasErrors('precioFinal')}" class="text-danger" th:errors="*{precioFinal}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Auto</label>
          <select th:field="*{auto}" class="form-select" required>
            <option value="" selected disabled>Seleccione un auto...</option>
            <option th:each="auto : ${autos}" th:value="${auto.id}" th:text="${auto.marca + ' ' + auto.modelo}"></option>
          </select>
          <div th:if="${#fields.hasErrors('auto')}" class="text-danger" th:errors="*{auto}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Cliente</label>
          <select th:field="*{cliente}" class="form-select" required>
            <option value="" selected disabled>Seleccione un cliente...</option>
            <option th:each="cliente : ${clientes}" th:value="${cliente.id}" th:text="${cliente.nombre}"></option>
          </select>
          <div th:if="${#fields.hasErrors('cliente')}" class="text-danger" th:errors="*{cliente}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Vendedor</label>
          <select th:field="*{vendedor}" class="form-select" required>
            <option value="" selected disabled>Seleccione un vendedor...</option>
            <option th:each="vendedor : ${vendedores}" th:value="${vendedor.id}" th:text="${vendedor.nombre}"></option>
          </select>
          <div th:if="${#fields.hasErrors('vendedor')}" class="text-danger" th:errors="*{vendedor}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/ventas}" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
