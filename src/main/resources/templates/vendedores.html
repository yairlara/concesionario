<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vendedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" th:href="@{/autos}">Concesionario</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item" th:if="${session.usuarioLogueado != null}">
              <span class="nav-link text-light">Bienvenido, <span th:text="${session.usuarioLogueado.nombre}"></span></span>
            </li>
            <li class="nav-item" th:if="${session.usuarioLogueado != null}">
              <a class="nav-link" th:href="@{/logout}">Cerrar sesión</a>
            </li>
            <li class="nav-item" th:unless="${session.usuarioLogueado != null}">
              <a class="nav-link" th:href="@{/login}">Iniciar sesión</a>
            </li>
            <li class="nav-item" th:unless="${session.usuarioLogueado != null}">
              <a class="nav-link" th:href="@{/registro}">Registrarse</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Vendedores</h1>
        <a th:href="@{/vendedores/nuevo}" class="btn btn-primary">Agregar Vendedor</a>
      </div>

      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Email</th>
              <th>Comisión</th>
              <th>Sucursal</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="vendedor : ${vendedores}">
              <td th:text="${vendedor.id}"></td>
              <td th:text="${vendedor.nombre}"></td>
              <td th:text="${vendedor.telefono}"></td>
              <td th:text="${vendedor.email}"></td>
              <td th:text="${vendedor.comision}"></td>
              <td th:text="${vendedor.sucursal != null ? vendedor.sucursal.nombre : 'Sin sucursal'}"></td>
              <td>
                <a th:href="@{'/vendedores/editar/' + ${vendedor.id}}" class="btn btn-secondary btn-sm">Editar</a>
                <a th:href="@{'/vendedores/eliminar/' + ${vendedor.id}}" class="btn btn-danger btn-sm">Eliminar</a>
              </td>
            </tr>
            <tr th:unless="${#lists.size(vendedores) > 0}">
              <td colspan="7" class="text-center">No hay vendedores registrados</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
