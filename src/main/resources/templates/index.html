<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Concesionario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      .banner {
        width: 100%;
        height: 300px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container mt-4">
      <img src="/images/banner.jpg" alt="Banner Concesionario" class="banner">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Concesionario</h1>
        <a th:href="@{/autos/nuevo}" class="btn btn-primary">Agregar Auto</a>
      </div>
    </div>

    <div class="container">
        <h2>Autos registrados</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Año</th>
                    <th>Precio</th>
                    <th>Disponible</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="auto : ${autos}">
                    <td th:text="${auto.id}"></td>
                    <td th:text="${auto.marca}"></td>
                    <td th:text="${auto.modelo}"></td>
                    <td th:text="${auto.anio}"></td>
                    <td th:text="${auto.precio}"></td>
                    <td th:text="${auto.disponible} ? 'Si' : 'No'"></td>
                    <td>
                        <a th:href="@{'/autos/editar/' + ${auto.id}}" class="btn btn-secondary btn-sm">Editar</a>
                        <a th:href="@{'/autos/eliminar/' + ${auto.id}}" class="btn btn-danger btn-sm">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
