<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Concesionario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      .banner {
        width: 100%;
        height: 300px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      .foto-auto {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }
      .foto-auto:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>

    <!-- ============================================================
         Navbar de navegación
         ============================================================
         th:if="${session.usuarioLogueado != null}" evalúa si hay
         un usuario autenticado en la sesión HTTP.

         session.usuarioLogueado accede al atributo que guardamos
         en el controlador con:
           session.setAttribute("usuarioLogueado", usuarioBD);
         ============================================================ -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" th:href="@{/autos}">Concesionario</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">

            <li class="nav-item">
              <a class="nav-link" th:href="@{/sucursales}">Sucursales</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/vendedores}">Vendedores</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/clientes}">Clientes</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/ventas}">Ventas</a>
            </li>

            <!-- Si el usuario está logueado, mostrar su nombre -->
            <li class="nav-item" th:if="${session.usuarioLogueado != null}">
              <span class="nav-link text-light">
                Bienvenido, <span th:text="${session.usuarioLogueado.nombre}"></span>
              </span>
            </li>

            <!-- Si el usuario está logueado, mostrar cerrar sesión -->
            <li class="nav-item" th:if="${session.usuarioLogueado != null}">
              <a class="nav-link" th:href="@{/logout}">Cerrar sesión</a>
            </li>

            <!-- Si NO hay sesión, mostrar iniciar sesión -->
            <li class="nav-item" th:unless="${session.usuarioLogueado != null}">
              <a class="nav-link" th:href="@{/login}">Iniciar sesión</a>
            </li>

            <!-- Si NO hay sesión, mostrar registrarse -->
            <li class="nav-item" th:unless="${session.usuarioLogueado != null}">
              <a class="nav-link" th:href="@{/registro}">Registrarse</a>
            </li>

          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <img th:src="@{/uploads/banner.jpg}" alt="Banner Concesionario" class="banner">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Concesionario</h1>
        <a th:href="@{/autos/nuevo}" class="btn btn-primary">Agregar Auto</a>
      </div>
    </div>

    <div class="container">
      <h2>Autos registrados</h2>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Imagen</th>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Año</th>
            <th>Precio</th>
            <th>Categoría</th>
            <th>Disponible</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="auto : ${autos}">
            <td th:text="${auto.id}"></td>
            <td>
              <img th:if="${auto.imagen != null and !auto.imagen.isBlank()}" th:src="@{'/uploads/' + ${auto.imagen}}"
              alt="Imagen del auto" style="height: 60px;">
            <span th:unless="${auto.imagen != null and !auto.imagen.isBlank()}">&mdash;</span>
            </td>
            <td th:text="${auto.marca}"></td>
            <td th:text="${auto.modelo}"></td>
            <td th:text="${auto.anio}"></td>
            <td th:text="${auto.precio}"></td>
            <td th:text="${auto.categoria != null ? auto.categoria.nombre : 'Sin categoría'}"></td>
            <td th:text="${auto.disponible} ? 'Si' : 'No'"></td>
            <td>
              <a th:href="@{'/autos/editar/' + ${auto.id}}" class="btn btn-secondary btn-sm">Editar</a>
              <a th:href="@{'/autos/eliminar/' + ${auto.id}}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="container mt-5 mb-5">
      <div class="row g-3">
        <div class="col-4">
          <img th:src="@{/uploads/imagen1.jpg}" alt="Auto 1" class="foto-auto" data-bs-toggle="modal" data-bs-target="#modalImagen" data-src="/uploads/imagen1.jpg">
        </div>
        <div class="col-4">
          <img th:src="@{/uploads/imagen2.jpg}" alt="Auto 2" class="foto-auto" data-bs-toggle="modal" data-bs-target="#modalImagen" data-src="/uploads/imagen2.jpg">
        </div>
        <div class="col-4">
          <img th:src="@{/uploads/imagen3.jpg}" alt="Auto 3" class="foto-auto" data-bs-toggle="modal" data-bs-target="#modalImagen" data-src="/uploads/imagen3.jpg">
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalImagen" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0">
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body text-center p-0 pb-3">
            <img id="imagenAmpliada" src="" alt="Auto" style="width: 100%; border-radius: 8px;">
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const modalImagen = document.getElementById('modalImagen');
      modalImagen.addEventListener('show.bs.modal', function (e) {
        const src = e.relatedTarget.getAttribute('data-src');
        document.getElementById('imagenAmpliada').src = src;
      });
    </script>
  </body>
</html>
